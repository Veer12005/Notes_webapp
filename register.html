<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="reg.css">
    <style>
        body{
            background-repeat: no-repeat;
            background-size: cover;
            background-image: url(https://images.unsplash.com/photo-1616567839795-b33ce964db22?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1yZWxhdGVkfDY2fHx8ZW58MHx8fHx8);
        }
    </style>
</head>
<body>

<div class="Register-box">
    <form onsubmit="register(event)">
        <h2 style="color: white;">Register</h2>

        <div class="input-box">
            <input type="email" id="regUser" required>
            <label>Email</label>
        </div>

        <div class="input-box">
            <input type="password" id="regPass" required>
            <label>Password</label>
        </div>

        <div class="login-reg">
            <button type="submit">Register</button>
            <p>Already have account ? <a href="login.html">Login</a></p>
        </div>
    </form>
</div>

<script src="reg.js"></script>

</body>
</html>
