<!DOCTYPE html>
<html>
<head>
    <title>Notes for help</title>
    <style>
        body{
            background-repeat: no-repeat;
            background-size: cover;
            background-image: url(https://plus.unsplash.com/premium_photo-1667587245482-60a612c40a88?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDF8cVBZc0R6dkpPWWN8fGVufDB8fHx8fA%3D%3D);
            animation: animateBg 5s linear infinite;
        }

        @keyframes animateBg{
            100%{
                filter: hue-rotate(360deg);
            }
        }
    </style>
    <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRporP2wg-Uk8xn2L-K6BV907rKofqlNdSNAA&s" type="image/x-icon">
    <link href="login.css" rel="stylesheet" type="text/css">
</head>
<body>
    <div>
        <h1 style="color: blanchedalmond;">Hello !!</h1>
        <p style="color: aquamarine;">This Site Is For You...So Read And Contribute And Make All Grow Together...</p>
    </div>

    <section>
        <div class="Login-box">
            <form onsubmit="login(event)">
                <h2>Login</h2>

                <div class="input-box">
                    <span class="icon"><ion-icon name="mail"></ion-icon></span>
                    <input type="email" id="loginUser" required>
                    <label>Email</label>
                </div>

                <div class="input-box">
                    <span class="icon"><ion-icon name="lock-closed-sharp"></ion-icon></span>
                    <input type="password" id="loginPass" required>
                    <label>Password</label>
                </div>

                <div class="remember-forget">
                    <label><input type="checkbox">Remember me</label>
                    <a href="#">Forget Password ?</a>
                </div>

                <button type="submit">Login</button>

                <div class="register">
                    <p>Don't have account ? <a href="register.html">Register</a></p>
                </div>
            </form>
        </div>
    </section>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script src="login.js"></script>
</body>
</html>
